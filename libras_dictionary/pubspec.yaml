name: libras_dictionary
description: "Dicionário de Libras."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  video_player: ^2.11.1
  chewie: ^1.13.1
  flutter_html: ^3.0.0
  youtube_player_flutter: ^9.1.3
  diacritic: ^0.1.6
  flutter_svg: ^2.0.10+1
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.5
  youtube_explode_dart: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  mockito: ^5.6.4
  build_runner: ^2.15.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icone_logo.svg"
  adaptive_icon_background: "#1E88E5"
  adaptive_icon_foreground: "assets/icone_logo.svg"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/icone_logo.svg
    - assets/icone_logo.png
    - assets/icone_logo_highres.png
    - assets/icone_logo_vector_quality.png
